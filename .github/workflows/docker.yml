name: Docker build & push

# Build a push image do Docker Hubu (jaledeveloper/paseo-api):
#  - na push gitového tagu v* (např. v0.1.0) → tag = verze + latest
#  - na publikování GitHub Release → totéž
#  - ručně přes "Run workflow"
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE: jaledeveloper/paseo-api

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Username is not sensitive; the token is the DOCKERHUB_TOKEN repo secret.
          username: jaledeveloper
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
