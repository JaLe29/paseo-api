name: Docker build & push

# Build & push image to Docker Hub (jaledeveloper/paseo-api).
# Manual only — trigger via "Run workflow" in the Actions tab.
# Optional `version` input adds a versioned tag (e.g. 0.1.0) next to latest.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. 0.1.0). Leave empty for latest only."
        required: false
        type: string

env:
  IMAGE: jaledeveloper/paseo-api

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the GitHub Release + tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # Username is not sensitive; the token is the DOCKERHUB_TOKEN repo secret.
          username: jaledeveloper
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: inputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --target "${{ github.sha }}" \
            --title "v${{ inputs.version }}" \
            --notes "Docker image: \`${{ env.IMAGE }}:${{ inputs.version }}\` (also tagged \`latest\`)." \
            --generate-notes
